<aside
    class="fixed left-0 top-0 z-50 h-screen w-64 bg-surface-raised border-r border-border flex flex-col transition-transform duration-200 xl:z-30 xl:translate-x-0"
    [class.translate-x-0]="showSidebar()"
    [class.-translate-x-full]="!showSidebar()">

  <!-- Header -->
  <div class="hidden xl:flex items-center h-14 px-5 border-b border-border">
    <span class="text-sm font-semibold tracking-tight text-text">Portfolio Optimizer</span>
  </div>

  <!-- Mobile close -->
  <div class="flex items-center justify-between h-14 px-4 border-b border-border xl:hidden">
    <span class="text-sm font-semibold tracking-tight text-text">Portfolio Optimizer</span>
    <button (click)="closeSidebar.emit()" class="p-1.5 rounded-md text-text-secondary hover:text-text hover:bg-surface-inset transition-colors" aria-label="Close menu">
      <i-lucide name="x" />
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto px-3 py-3 flex flex-col">
    @for (group of navGroups; track group.label) {
      <div [class]="group.pinBottom ? 'mt-auto pt-3 border-t border-border-muted' : ''">
        @if (!group.pinBottom) {
          <p class="px-2.5 pt-3 pb-1 text-[11px] font-medium uppercase tracking-wider text-text-tertiary">{{ group.label }}</p>
        }
        @for (item of group.items; track item.route) {
          <a [routerLink]="item.route"
             routerLinkActive
             #rla="routerLinkActive"
             [routerLinkActiveOptions]="{ exact: item.route === '/' }"
             [attr.aria-current]="rla.isActive ? 'page' : null"
             [class]="rla.isActive
               ? 'flex items-center gap-2.5 px-2.5 py-1.5 rounded-r-md text-nav text-text font-medium bg-surface-inset border-l-2 border-accent transition-colors mb-0.5'
               : 'flex items-center gap-2.5 px-2.5 py-1.5 rounded-r-md text-nav text-text-secondary border-l-2 border-transparent hover:text-text hover:bg-surface-inset transition-colors mb-0.5'"
             (click)="onNavClick()">
            <i-lucide [name]="item.icon" [strokeWidth]="rla.isActive ? 2 : 1.5" class="shrink-0" />
            <span>{{ item.name }}</span>
          </a>
        }
      </div>
    }
  </nav>
</aside>
