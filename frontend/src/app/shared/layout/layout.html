<div class="min-h-screen bg-surface">
  <!-- Skip to content (a11y) -->
  <a href="#main-content"
    class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-999 focus:px-4 focus:py-2 focus:bg-accent focus:text-white focus:rounded-md focus:text-sm focus:font-medium">
    Skip to main content
  </a>

  <!-- Mobile header -->
  <header
    class="xl:hidden flex items-center justify-between h-14 px-4 border-b border-border bg-surface-raised sticky top-0 z-30">
    <button (click)="toggleSidebar()"
      class="p-1.5 rounded-md text-text-secondary hover:text-text hover:bg-surface-inset transition-colors"
      aria-label="Open menu">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
    <span class="text-sm font-semibold tracking-tight text-text">Portfolio Optimizer</span>
    <div class="w-8"></div>
  </header>

  <!-- Overlay -->
  @if (showOverlay()) {
  <div class="fixed inset-0 bg-black/20 z-40 xl:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <app-sidebar [isOpen]="isSidebarOpen()" [isMobile]="isMobile()" (closeSidebar)="closeSidebar()"></app-sidebar>

  <!-- Main content -->
  <main id="main-content" class="xl:pl-64 h-[calc(100vh-3.5rem)] xl:h-screen flex flex-col pb-16 xl:pb-0">
    <div class="flex-1 overflow-y-auto">
      <div [@routerTransition]="outlet.isActivated ? outlet.activatedRoute : ''">
        <router-outlet #outlet="outlet"></router-outlet>
      </div>
    </div>
  </main>

  <!-- Bottom tab bar (mobile/tablet only) -->
  <app-bottom-tab-bar />

  <!-- Global overlays -->
  @if (searchService.isOpen()) {
  <app-global-search />
  }
  <app-modal-container />
  <app-toast-container />
</div>
