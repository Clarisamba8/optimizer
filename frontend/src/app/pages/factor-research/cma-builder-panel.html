<div class="space-y-6">

  <!-- Set Selector -->
  <div class="flex flex-wrap items-center gap-2">
    <span class="text-data-sm text-text-secondary">Scenario:</span>
    <div class="flex items-center gap-1 bg-surface-inset rounded-lg p-1">
      @for (set of cmaSets(); let i = $index; track set.label) {
        <button
          class="px-3 py-1.5 text-data-sm rounded-md transition-colors"
          [class]="selectedSet() === i ? 'bg-surface-raised text-text font-medium shadow-sm' : 'text-text-secondary hover:text-text'"
          (click)="selectedSet.set(i)"
        >
          {{ set.label }}
        </button>
      }
    </div>
    @if (activeSet()) {
      <span class="text-data-sm text-text-secondary ml-2">Horizon: {{ activeSet().horizon }}</span>
    }
  </div>

  @if (activeSet()) {
    <!-- Returns Table -->
    <div class="bg-surface-raised border border-border rounded-lg p-4">
      <h3 class="text-data-sm font-medium text-text mb-3">Capital Market Assumptions — {{ activeSet().label }}</h3>
      <app-data-table
        [columns]="returnsColumns"
        [rows]="returnsRows()"
        [total]="returnsRows().length"
        [pageSize]="15"
        [dense]="true"
      />
    </div>

    <!-- Risk-Return Scatter -->
    <div class="bg-surface-raised border border-border rounded-lg p-4">
      <h3 class="text-data-sm font-medium text-text mb-3">Risk vs Return — {{ activeSet().label }}</h3>
      <app-echarts-scatter
        [frontierPoints]="scatterPoints()"
        [height]="320"
      />
    </div>
  }

</div>
