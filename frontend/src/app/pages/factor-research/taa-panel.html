<div class="space-y-6">

  <!-- Section 1: Signal Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">TAA Factor Signals</h3>
    <app-data-table
      [columns]="signalColumns"
      [rows]="signalRows()"
      [total]="signalRows().length"
      [pageSize]="15"
      [dense]="true"
    />
  </div>

  <!-- Section 2: Current vs Tilted Grouped Bar -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Current vs Tilted Weights</h3>
    <div #barChart class="w-full" style="height: 260px"></div>
  </div>

  <!-- Section 3: Factor Return History -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Factor Return History (Cumulative)</h3>
    <div #lineChart class="w-full" style="height: 300px"></div>
  </div>

</div>
