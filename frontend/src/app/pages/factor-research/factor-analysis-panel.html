<div class="space-y-6">

  <!-- Section 1: Multi-factor Cumulative Return Chart -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Multi-Factor Cumulative Returns</h3>
    <app-chart-toolbar>
      <div #lineChart class="w-full h-[300px] sm:h-[360px]"></div>
    </app-chart-toolbar>
  </div>

  <!-- Section 2: Factor Correlation Heatmap -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Factor Correlation Matrix</h3>
    <app-chart-toolbar>
      <app-echarts-heatmap
        [assets]="correlationAssets()"
        [matrix]="correlationMatrix()"
        [height]="300"
      />
    </app-chart-toolbar>
  </div>

  <!-- Section 3: IC Report Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Factor IC Report</h3>
    <app-data-table
      [columns]="icColumns"
      [rows]="icRows()"
      [total]="icRows().length"
      [pageSize]="20"
      [dense]="true"
      [showExport]="true"
      exportFilename="factor-ic-report"
      [stickyFirstColumn]="true"
    />
  </div>

</div>
