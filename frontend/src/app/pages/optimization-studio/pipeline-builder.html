<div class="bg-surface-raised border border-border rounded-lg p-4">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-sm font-medium text-text">Pipeline</h2>
    <span class="text-xs text-text-tertiary">{{ completedCount() }} / {{ totalCount() }} steps complete</span>
  </div>

  <div class="relative">
    <div class="pointer-events-none absolute inset-y-0 right-0 w-8 bg-gradient-to-l from-surface-raised to-transparent z-10 lg:hidden"></div>
    <div class="flex items-center gap-3 overflow-x-auto pb-2 scroll-smooth snap-x">
    @for (node of nodes(); track node.id; let isFirst = $first) {
    @if (!isFirst) {
    <div class="w-6 h-px bg-border shrink-0"></div>
    }

    <button type="button" (click)="nodeSelect.emit(node.id)" [class]="cardClass(node.id)"
      [attr.aria-pressed]="node.id === activeNode()">
      <div class="text-xs font-medium text-text truncate">{{ node.label }}</div>
      <div class="mt-1.5 flex items-center gap-1.5">
        <span class="w-2 h-2 rounded-full shrink-0" [class]="statusColor(node.status)"></span>
        <span class="text-xs text-text-tertiary">{{ statusLabel(node.status) }}</span>
      </div>
      <div class="mt-1 text-xs text-text-tertiary truncate"
           [class.invisible]="!node.detail"
           [title]="node.detail || ''"
           [innerHTML]="node.detail || '&nbsp;'">
      </div>
    </button>
    }
    </div>
  </div>
</div>
