<div class="bg-surface-raised border border-border rounded-lg p-4 space-y-5">
  <h3 class="text-sm font-semibold text-text">Preprocessing Configuration</h3>

  <!-- Returns Type -->
  <div>
    <div class="flex items-center gap-2 mb-2">
      <label class="text-xs font-medium text-text-secondary">Returns Type</label>
      <app-help-tooltip text="Arithmetic returns use simple percentage changes. Log returns are continuously compounded and more suitable for multi-period analysis." />
    </div>
    <div class="flex gap-3">
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="returnsType"
          value="arithmetic"
          [checked]="returnsType() === 'arithmetic'"
          (change)="setReturnsType('arithmetic')"
          class="accent-accent" />
        <span class="text-xs text-text">Arithmetic</span>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input
          type="radio"
          name="returnsType"
          value="log"
          [checked]="returnsType() === 'log'"
          (change)="setReturnsType('log')"
          class="accent-accent" />
        <span class="text-xs text-text">Log Returns</span>
      </label>
    </div>
  </div>

  <!-- Frequency -->
  <div>
    <div class="flex items-center gap-2 mb-2">
      <label for="frequency" class="text-xs font-medium text-text-secondary">Frequency</label>
      <app-help-tooltip text="Resampling frequency for the return series. Daily gives the most information but may introduce noise. Monthly reduces noise for long-horizon strategies." />
    </div>
    <select
      id="frequency"
      [ngModel]="frequency()"
      (ngModelChange)="setFrequency($event)"
      class="w-full px-3 py-2 text-sm bg-surface border border-border rounded-lg text-text focus:outline-none focus:ring-1 focus:ring-accent">
      <option value="daily">Daily</option>
      <option value="weekly">Weekly</option>
      <option value="monthly">Monthly</option>
    </select>
  </div>

  <!-- Lookback Period -->
  <div>
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <label for="lookback" class="text-xs font-medium text-text-secondary">Lookback Period</label>
        <app-help-tooltip text="Number of years of historical data to include in moment estimation. Longer lookback increases stability but may include stale regime information." />
      </div>
      <span class="text-xs font-mono text-accent">{{ lookbackYears() }} yr{{ lookbackYears() > 1 ? 's' : '' }}</span>
    </div>
    <input
      id="lookback"
      type="range"
      min="1"
      max="10"
      step="1"
      [ngModel]="lookbackYears()"
      (ngModelChange)="setLookbackYears($event)"
      class="w-full accent-accent" />
    <div class="flex justify-between mt-1">
      <span class="text-xs text-text-tertiary">1 yr</span>
      <span class="text-xs text-text-tertiary">10 yrs</span>
    </div>
  </div>

  <!-- Missing Data -->
  <div>
    <div class="flex items-center gap-2 mb-2">
      <label for="missingData" class="text-xs font-medium text-text-secondary">Missing Data</label>
      <app-help-tooltip text="Strategy for handling NaN values in return series. Drop removes incomplete rows. Forward fill propagates last known value. Interpolate uses linear interpolation." />
    </div>
    <select
      id="missingData"
      [ngModel]="missingData()"
      (ngModelChange)="setMissingData($event)"
      class="w-full px-3 py-2 text-sm bg-surface border border-border rounded-lg text-text focus:outline-none focus:ring-1 focus:ring-accent">
      <option value="drop">Drop</option>
      <option value="forward_fill">Forward Fill</option>
      <option value="interpolate">Interpolate</option>
    </select>
  </div>

  <!-- Outlier Treatment -->
  <div>
    <div class="flex items-center gap-2 mb-2">
      <label for="outlier" class="text-xs font-medium text-text-secondary">Outlier Treatment</label>
      <app-help-tooltip text="How to handle extreme return values. Winsorize caps values at a percentile threshold. Trim removes them. None keeps all values as-is." />
    </div>
    <select
      id="outlier"
      [ngModel]="outlierTreatment()"
      (ngModelChange)="setOutlierTreatment($event)"
      class="w-full px-3 py-2 text-sm bg-surface border border-border rounded-lg text-text focus:outline-none focus:ring-1 focus:ring-accent">
      <option value="winsorize">Winsorize</option>
      <option value="trim">Trim</option>
      <option value="none">None</option>
    </select>
  </div>
</div>
