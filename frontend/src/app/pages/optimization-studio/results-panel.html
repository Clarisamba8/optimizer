<div class="space-y-5">
  <!-- Stat Cards Row -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
    @for (card of statsCards(); track card.label) {
      <app-stat-card
        [label]="card.label"
        [value]="card.value"
        [trend]="card.trend" />
    }
  </div>

  <!-- Efficient Frontier -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h4 class="text-xs font-medium text-text-secondary uppercase tracking-wide mb-3">Efficient Frontier</h4>
    <app-echarts-scatter
      [frontierPoints]="frontierPoints()"
      [optimalPoint]="optimalPoint()"
      [height]="280" />
  </div>

  <!-- Optimal Weights Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h4 class="text-xs font-medium text-text-secondary uppercase tracking-wide mb-3">Optimal Weights</h4>
    <app-data-table
      [columns]="weightsTableColumns"
      [rows]="weightsTableRows()"
      [total]="weightsTableRows().length"
      [dense]="true"
      [pageSize]="10" />
  </div>

  <!-- Strategy Comparison Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h4 class="text-xs font-medium text-text-secondary uppercase tracking-wide mb-3">Strategy Comparison</h4>
    <app-data-table
      [columns]="strategyTableColumns"
      [rows]="strategyTableRows()"
      [total]="strategyTableRows().length"
      [dense]="true" />
  </div>

  <!-- Action Buttons -->
  <div class="flex items-center justify-end gap-3">
    <button
      type="button"
      class="px-4 py-2 text-sm font-medium rounded-lg border border-border text-text-secondary hover:bg-surface-inset transition-colors">
      Export Results
    </button>
    <button
      type="button"
      class="px-4 py-2 text-sm font-medium rounded-lg bg-accent text-white hover:bg-accent/90 transition-colors">
      Apply Weights
    </button>
  </div>
</div>
