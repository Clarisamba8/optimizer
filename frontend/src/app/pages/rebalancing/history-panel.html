<div class="space-y-6">

  <!-- Rebalancing Log Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <p class="text-data-sm font-medium text-text mb-3">Rebalancing Log</p>
    <app-data-table
      [columns]="columns"
      [rows]="tableRows()"
      [total]="tableRows().length"
      [dense]="true"
      [showExport]="true"
      exportFilename="rebalancing-history"
    />
  </div>

  <!-- Cumulative Charts -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Cumulative Turnover -->
    <div class="bg-surface-raised border border-border rounded-lg p-4">
      <p class="text-data-sm font-medium text-text mb-3">Cumulative Turnover</p>
      <app-chart-toolbar [showDataTable]="false">
        <app-echarts-line
          [labels]="chartLabels()"
          [values]="cumulativeTurnoverValues()"
          [height]="220"
          [areaFill]="true"
        />
      </app-chart-toolbar>
    </div>

    <!-- Cumulative Cost -->
    <div class="bg-surface-raised border border-border rounded-lg p-4">
      <p class="text-data-sm font-medium text-text mb-3">Cumulative Cost</p>
      <app-chart-toolbar [showDataTable]="false">
        <app-echarts-line
          [labels]="chartLabels()"
          [values]="cumulativeCostValues()"
          [height]="220"
          [areaFill]="true"
          yAxisPrefix="$"
        />
      </app-chart-toolbar>
    </div>

  </div>

</div>
