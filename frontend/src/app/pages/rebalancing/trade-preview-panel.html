<div class="space-y-6">
  <!-- Summary KPIs -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
    <app-stat-card label="Turnover" [value]="kpiTurnover()" subtitle="Total portfolio turnover" />
    <app-stat-card label="Est. Cost" [value]="kpiCost()" subtitle="Transaction cost estimate" />
    <app-stat-card label="Buys" [value]="kpiBuys()" subtitle="Buy orders" />
    <app-stat-card label="Sells" [value]="kpiSells()" subtitle="Sell orders" />
    <app-stat-card label="Net Cash Flow" [value]="kpiNetCashFlow()" subtitle="Net proceeds / outflow" />
  </div>

  <!-- Weight Changes Waterfall -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Weight Changes (bps)</h3>
    <app-chart-toolbar [showDataTable]="false">
      <app-echarts-waterfall
        [categories]="waterfallCategories()"
        [values]="waterfallValues()"
        [height]="260"
      />
    </app-chart-toolbar>
  </div>

  <!-- Trade Details Table -->
  <div class="bg-surface-raised border border-border rounded-lg p-4">
    <h3 class="text-data-sm font-medium text-text mb-3">Trade Details</h3>
    <app-data-table
      [columns]="tradeColumns"
      [rows]="tradeRows()"
      [total]="tradeRows().length"
      [pageSize]="15"
      [dense]="true"
      [showExport]="true"
      exportFilename="trade-preview"
    />
  </div>
</div>
