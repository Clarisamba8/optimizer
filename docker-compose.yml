services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: optimizer_db
    environment:
      POSTGRES_DB: optimizer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optimizer_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - optimizer_network

  # Adminer - Database Management UI
  adminer:
    image: adminer:latest
    container_name: optimizer_adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "18081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - optimizer_network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: optimizer_api
    env_file:
      - .env
    environment:
      # Override DB URL to use Docker internal hostname instead of localhost
      DATABASE_URL: postgresql://postgres:postgres@db:5432/optimizer_db
      # Override Ollama to reach host machine from inside container
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    ports:
      - "8005:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - optimizer_network

  # Angular Frontend (nginx reverse proxy)
  frontend:
    build:
      context: ./frontend
    container_name: optimizer_frontend
    ports:
      - "4300:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - optimizer_network

volumes:
  postgres_data:

networks:
  optimizer_network:
